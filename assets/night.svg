<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="night balcony scene">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0b1a"/>
      <stop offset="0.65" stop-color="#141129"/>
      <stop offset="1" stop-color="#1a1033"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d8d4f2" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#d8d4f2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .star{animation:tw 3s ease-in-out infinite}
    .d1{animation-delay:.6s}.d2{animation-delay:1.2s}.d3{animation-delay:1.8s}.d4{animation-delay:2.4s}
    @keyframes tw{0%,100%{opacity:.15}50%{opacity:1}}
    .steam{animation:rise 4.5s ease-in-out infinite;opacity:0}
    .s2{animation-delay:1.5s}.s3{animation-delay:3s}
    @keyframes rise{0%{opacity:0;transform:translateY(5px)}25%{opacity:.6}100%{opacity:0;transform:translateY(-20px)}}
    .win{animation:flick 7s ease-in-out infinite}
    .w2{animation-delay:2.3s}.w3{animation-delay:4.6s}
    @keyframes flick{0%,100%{opacity:.85}50%{opacity:.2}}
    .head{animation:look 8s ease-in-out infinite;transform-origin:646px 199px}
    @keyframes look{0%,55%,100%{transform:rotate(0)}65%,80%{transform:rotate(-9deg)}}
    .shoot{animation:sh 9s linear infinite;opacity:0}
    @keyframes sh{0%,88%{opacity:0;transform:translate(0,0)}90%{opacity:.9}100%{opacity:0;transform:translate(-190px,60px)}}
  </style>

  <rect width="900" height="320" fill="url(#sky)"/>

  <!-- stars -->
  <circle class="star" cx="90" cy="45" r="1.6" fill="#cfc9ee"/>
  <circle class="star d1" cx="200" cy="80" r="1.2" fill="#cfc9ee"/>
  <circle class="star d2" cx="330" cy="38" r="1.8" fill="#e8e4fa"/>
  <circle class="star d3" cx="430" cy="95" r="1.1" fill="#cfc9ee"/>
  <circle class="star d4" cx="520" cy="55" r="1.5" fill="#e8e4fa"/>
  <circle class="star d1" cx="610" cy="30" r="1.2" fill="#cfc9ee"/>
  <circle class="star d3" cx="700" cy="110" r="1.3" fill="#cfc9ee"/>
  <circle class="star d2" cx="860" cy="90" r="1.4" fill="#e8e4fa"/>
  <circle class="star d4" cx="60" cy="130" r="1.1" fill="#cfc9ee"/>
  <circle class="star" cx="270" cy="140" r="1.0" fill="#cfc9ee"/>
  <line class="shoot" x1="560" y1="40" x2="596" y2="28" stroke="#e8e4fa" stroke-width="1.4" stroke-linecap="round"/>

  <!-- moon -->
  <circle cx="790" cy="62" r="70" fill="url(#glow)"/>
  <circle cx="790" cy="62" r="26" fill="#d8d4f2" opacity=".92"/>
  <circle cx="801" cy="54" r="23" fill="#131129"/>

  <!-- skyline -->
  <g fill="#0e0c1e">
    <rect x="0"   y="168" width="70"  height="60"/>
    <rect x="80"  y="150" width="55"  height="78"/>
    <rect x="300" y="176" width="66"  height="52"/>
    <rect x="380" y="142" width="48"  height="86"/>
    <rect x="440" y="188" width="80"  height="40"/>
    <rect x="700" y="160" width="58"  height="68"/>
    <rect x="770" y="184" width="90"  height="44"/>
  </g>
  <g fill="#ffb000">
    <rect class="win"    x="94"  y="162" width="4" height="5"/>
    <rect class="win w2" x="110" y="180" width="4" height="5"/>
    <rect class="win w3" x="394" y="156" width="4" height="5"/>
    <rect class="win w2" x="410" y="176" width="4" height="5"/>
    <rect class="win"    x="716" y="172" width="4" height="5"/>
    <rect class="win w3" x="20"  y="182" width="4" height="5"/>
  </g>

  <!-- balcony floor + railing -->
  <rect x="0" y="288" width="900" height="32" fill="#08070f"/>
  <rect x="40" y="208" width="820" height="5" rx="2" fill="#231d3d"/>
  <g stroke="#231d3d" stroke-width="4">
    <line x1="70"  y1="213" x2="70"  y2="290"/><line x1="150" y1="213" x2="150" y2="290"/>
    <line x1="230" y1="213" x2="230" y2="290"/><line x1="310" y1="213" x2="310" y2="290"/>
    <line x1="390" y1="213" x2="390" y2="290"/><line x1="470" y1="213" x2="470" y2="290"/>
    <line x1="550" y1="213" x2="550" y2="290"/><line x1="630" y1="213" x2="630" y2="290"/>
    <line x1="710" y1="213" x2="710" y2="290"/><line x1="790" y1="213" x2="790" y2="290"/>
  </g>

  <!-- figure leaning on rail -->
  <g fill="#050508">
    <circle cx="185" cy="142" r="15"/>
    <path d="M163 210 q-2 -42 22 -50 q20 -6 26 14 q4 14 20 22 l14 8 q4 3 1 7 l-6 1 q-16 -4 -30 -12 l0 10 q0 8 -8 8 l-31 0 q-8 0 -8 -8 z"/>
    <rect x="166" y="205" width="12" height="85" rx="4"/>
    <rect x="186" y="205" width="12" height="85" rx="4"/>
  </g>

  <!-- coffee on the rail -->
  <g>
    <rect x="258" y="190" width="22" height="20" rx="3" fill="#2b2350"/>
    <path d="M280 194 q10 2 0 11" stroke="#2b2350" stroke-width="3" fill="none"/>
    <path class="steam"    d="M264 186 q3 -6 0 -11" stroke="#8b80c9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path class="steam s2" d="M270 186 q-3 -6 0 -11" stroke="#8b80c9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path class="steam s3" d="M276 186 q3 -6 0 -11" stroke="#8b80c9" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- bird on the rail -->
  <g fill="#050508">
    <ellipse cx="662" cy="196" rx="20" ry="12"/>
    <polygon points="678,194 706,202 680,203"/>
    <g class="head">
      <circle cx="646" cy="187" r="9"/>
      <polygon points="638,186 626,189 638,191"/>
      <circle cx="643" cy="185" r="1.6" fill="#a78bfa"/>
    </g>
    <line x1="656" y1="207" x2="656" y2="212" stroke="#050508" stroke-width="2"/>
    <line x1="666" y1="207" x2="666" y2="212" stroke="#050508" stroke-width="2"/>
  </g>
</svg>